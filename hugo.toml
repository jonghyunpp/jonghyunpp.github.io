baseURL = "https://www.jonghyunp.me.kr/"
languageCode = "ko-KR"
title = "jonghyunp's BLOG ⭐️"
theme = "PaperMod"
enableRobotsTXT = true


buildDrafts = false
buildFuture = false

[pagination]
pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  env = "production"
  author = "jonghyunp"
  description = "일상의 모든 주제를 기록합니다."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[params.homeInfoParams]
  Title = "읽다 보면 쓸모 있는 이야기들 ✨"
  Content = "뉴스·경제·여행·생활, 오늘도 한 조각 🍀"

[menu]
  [[menu.main]]
    identifier = "news"
    name = "📰 뉴스"
    url = "/news/"
    weight = 10
  [[menu.main]]
    identifier = "life"
    name = "🏠 생활"
    url = "/life/"
    weight = 20
  [[menu.main]]
    identifier = "culture"
    name = "🎭 문화"
    url = "/culture/"
    weight = 30
  [[menu.main]]
    identifier = "travel"
    name = "✈️ 여행"
    url = "/travel/"
    weight = 40
  [[menu.main]]
    identifier = "tags"
    name = "🏷️ 태그"
    url = "/tags/"
    weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
